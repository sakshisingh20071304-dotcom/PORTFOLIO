<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sakshi Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <main class="sub-page">
        <section class="container section">
            <h3 class="section-tag">Get in Touch</h3>
            <h1>Let's <span class="gradient-text">Collaborate</span>.</h1>
            
            <div class="contact-layout">
                <div class="contact-info-list">
                    <div class="c-item">
                        <strong>Email:</strong>
                        <p>sakshi_singh25@mru.ac.in</p>
                    </div>
                    <div class="c-item">
                        <strong>University:</strong>
                        <p>Manav Rachna University, Faridabad</p>
                    </div>
                    <div class="c-item">
                        <strong>Social:</strong>
                        <p>LinkedIn | GitHub | Twitter</p>
                    </div>
                </div>
                
                <form id="contact-form" class="glass-form">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <textarea rows="5" placeholder="Your Vision"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>
    </main>
    <script src="layout.js"></script>
    <script src="main.js"></script>
</body>
</html>
